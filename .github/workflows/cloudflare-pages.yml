name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main  # Change this to 'master' if your default branch is named master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=6144" # Maximizes Node.js memory allowance

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # --- ADDED CACHE STEP ---
      - name: Cache Node Modules and Build Folders
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .cache
            dist
          key: ${{ runner.os }}-node-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-build-
      # ------------------------

      - name: Install dependencies
        run: npm install

      - name: Clean dist folder
        run: rm -rf dist

      - name: Build site
        run: npm run build 

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=dnbtheory
